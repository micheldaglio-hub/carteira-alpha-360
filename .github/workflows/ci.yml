name: Carteira Alpha 360 CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./ci_test.db
          SECRET_KEY: ci-only-secret-key-with-enough-length-for-tests
          SEED_DEMO_DATA: "false"
        run: python -m unittest discover -s tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Start backend
        working-directory: backend
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          ENVIRONMENT: development
          DATABASE_URL: sqlite:///./e2e.db
          SECRET_KEY: e2e-only-secret-key-with-enough-length-for-tests
          SEED_DEMO_DATA: "true"
          MARKET_DATA_PROVIDER: mock
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../backend-e2e.log 2>&1 &
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:8000/api/health && exit 0
            sleep 1
          done
          cat ../backend-e2e.log
          exit 1

      - name: Start frontend
        working-directory: frontend
        run: |
          pnpm run dev -- --host 127.0.0.1 --port 5173 > ../frontend-e2e.log 2>&1 &
          for i in {1..45}; do
            curl -fsS http://127.0.0.1:5173 && exit 0
            sleep 1
          done
          cat ../frontend-e2e.log
          exit 1

      - name: Run E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:5173
        run: pnpm run e2e
