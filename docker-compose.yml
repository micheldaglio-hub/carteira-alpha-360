services:
  postgres:
    image: postgres:16-alpine
    container_name: carteira-alpha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carteira_alpha
      POSTGRES_PASSWORD: carteira_alpha
      POSTGRES_DB: carteira_alpha
    ports:
      - "5432:5432"
    volumes:
      - carteira_alpha_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carteira_alpha -d carteira_alpha"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  carteira_alpha_pg:
